<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIFT ULTIMATE 2026 Tests</title>
    <style>
        :root { color-scheme: dark; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #09090b; color: #f8fafc; }
        body { margin: 0; padding: 24px; }
        main { max-width: 1120px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; gap: 16px; align-items: center; margin-bottom: 20px; }
        h1 { margin: 0; font-size: 28px; letter-spacing: -0.02em; }
        button { border: 0; border-radius: 10px; padding: 12px 16px; font-weight: 800; color: white; background: #4f46e5; cursor: pointer; }
        .summary { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; margin-bottom: 18px; }
        .card, details { background: #18181b; border: 1px solid rgba(255,255,255,0.10); border-radius: 12px; padding: 14px; }
        .metric { font-size: 26px; font-weight: 900; }
        .muted { color: #94a3b8; font-size: 13px; }
        .pass { color: #34d399; }
        .fail { color: #fb7185; }
        .group-list { display: grid; gap: 12px; }
        summary { cursor: pointer; font-weight: 900; }
        .test-row { display: grid; grid-template-columns: 92px 1fr; gap: 10px; padding: 10px 0; border-top: 1px solid rgba(255,255,255,0.08); }
        .test-row:first-of-type { margin-top: 12px; }
        pre { white-space: pre-wrap; margin: 8px 0 0; padding: 10px; border-radius: 8px; background: #09090b; color: #cbd5e1; overflow: auto; }
        iframe { width: 1px; height: 1px; position: absolute; left: -9999px; top: -9999px; border: 0; }
        .all-good { border-color: rgba(52,211,153,0.45); background: rgba(6,78,59,0.28); }
        @media (max-width: 720px) { body { padding: 14px; } header, .summary { grid-template-columns: 1fr; display: grid; } }
    </style>
</head>

<body>
    <main>
        <header>
            <div>
                <h1>LIFT ULTIMATE 2026 Test Suite</h1>
                <div class="muted">Standalone deterministic tests. Storage, fetch, timers, audio, wake lock, Chart, and confetti are isolated.</div>
            </div>
            <button id="runAgain" type="button">Run tests</button>
        </header>
        <section class="summary">
            <div class="card"><div id="status" class="metric">Idle</div><div class="muted">Status</div></div>
            <div class="card"><div id="passCount" class="metric pass">0</div><div class="muted">Passed</div></div>
            <div class="card"><div id="failCount" class="metric fail">0</div><div class="muted">Failed</div></div>
            <div class="card"><div id="totalCount" class="metric">0</div><div class="muted">Total</div></div>
        </section>
        <section id="results" class="group-list"></section>
        <iframe id="appFrame" title="Isolated index.html test frame"></iframe>
    </main>

    <script>
        const GROUPS = ['Utilities', 'Workout generation', 'Progression', 'Recovery', 'Volume landmarks', 'PR / e1RM', 'Plate loading', 'Persistence', 'Theme / preferences', 'Smoke tests'];
        const FIXTURE_TMS = { Bench: 225, Squat: 315, Deadlift: 405, OHP: 135, Row: 185 };
        const DEFAULT_PREFS = { weightUnit: 'lbs', microplates: false, program: 'nsuns', barWeight: 45 };
        const NOW = Date.UTC(2026, 0, 1, 12, 0, 0);

        let activeGroup = '';
        let results = [];
        let api = null;
        const el = id => document.getElementById(id);
        const clean = v => JSON.stringify(v, null, 2);
        const eqJSON = (a, b) => JSON.stringify(a) === JSON.stringify(b);

        function record(ok, message, actual, expected, details = '') {
            results.push({ group: activeGroup, ok, message, actual, expected, details });
            if (!ok) throw new Error(message);
        }
        function assertEqual(actual, expected, message) { record(Object.is(actual, expected), message, actual, expected); }
        function assertApprox(actual, expected, tolerance, message) { record(Math.abs(actual - expected) <= tolerance, message, actual, expected, `tolerance ${tolerance}`); }
        function assertDeepEqual(actual, expected, message) { record(eqJSON(actual, expected), message, actual, expected); }
        function assertTrue(value, message) { record(!!value, message, value, true); }
        function assertFalse(value, message) { record(!value, message, value, false); }
        function assertIncludes(value, expectedSubstring, message) { record(String(value).includes(expectedSubstring), message, value, expectedSubstring); }

        function test(group, name, fn) {
            activeGroup = group;
            try {
                fn();
                if (!results.some(r => r.group === group && r.message === name)) record(true, name, 'completed', 'completed');
            } catch (err) {
                if (!results.some(r => r.group === group && r.message === name && !r.ok)) {
                    results.push({ group, ok: false, message: name, actual: err.message, expected: 'no error', details: err.stack || '' });
                }
            }
        }

        async function testAsync(group, name, fn) {
            activeGroup = group;
            try {
                await fn();
                if (!results.some(r => r.group === group && r.message === name)) record(true, name, 'completed', 'completed');
            } catch (err) {
                if (!results.some(r => r.group === group && r.message === name && !r.ok)) {
                    results.push({ group, ok: false, message: name, actual: err.message, expected: 'no error', details: err.stack || '' });
                }
            }
        }

        function completeSet({ reps = 5, performed = reps, weight = 100, amrap = false, failed = false, completed = true } = {}) {
            return { weight, originalWeight: weight, reps, performed, amrap, completed, failed };
        }
        function completeSets(n = 3, reps = 5) {
            return Array.from({ length: n }, () => completeSet({ reps, performed: reps }));
        }
        function snapshot(sets) {
            return sets.map(s => `${s.weight}x${s.reps}${s.amrap ? '+' : ''}`);
        }
        function gen(program, scheme, lift = 'Bench', tier = 't1', extra = {}) {
            return api.generateSets({ scheme, lift, tm: FIXTURE_TMS[lift] || 225, tier, tms: FIXTURE_TMS, prefs: { ...DEFAULT_PREFS, program, ...(extra.prefs || {}) }, state: extra.state || {}, cycleWeek531: extra.cycleWeek531, exerciseOverride: extra.exerciseOverride });
        }
        function prog(args) {
            return api.calculateProgression({ tms: FIXTURE_TMS, prefs: DEFAULT_PREFS, ...args });
        }
        function fakeStorage(seed = {}) {
            const calls = [];
            const data = { ...seed };
            return {
                calls,
                getItem(k) { calls.push(['get', k]); return Object.prototype.hasOwnProperty.call(data, k) ? data[k] : null; },
                setItem(k, v) { calls.push(['set', k]); data[k] = String(v); },
                removeItem(k) { calls.push(['remove', k]); delete data[k]; },
                clear() { calls.push(['clear']); Object.keys(data).forEach(k => delete data[k]); },
                dump() { return { ...data }; }
            };
        }

        async function loadIndexApi() {
            const old = el('appFrame');
            const frame = old.cloneNode(false);
            old.replaceWith(frame);
            const readLocalAsset = name => new Promise((resolve, reject) => {
                try {
                    const xhr = new XMLHttpRequest();
                    xhr.open('GET', name, true);
                    xhr.onload = () => xhr.status === 0 || (xhr.status >= 200 && xhr.status < 300) ? resolve(xhr.responseText) : reject(new Error(`XHR failed for ${name}`));
                    xhr.onerror = reject;
                    xhr.send();
                } catch (err) {
                    reject(err);
                }
            });
            const readText = async name => {
                try {
                    const res = await fetch(name, { cache: 'no-store' });
                    if (!res.ok) throw new Error(`Could not read ${name}`);
                    return await res.text();
                } catch {
                    return await readLocalAsset(name);
                }
            };
            const loadSrcdoc = async html => {
                const appJs = await readText('app.js');
                frame.srcdoc = html
                    .replace(/<script\s+src=["']app\.js["']\s*><\/script>/i, `<script>${appJs.replace(/<\/script>/gi, '<\\/script>')}<\/script>`)
                    .replace(/<script[^>]+src=["'][^"']+["'][^>]*><\/script>/gi, '')
                    .replace(/<link[^>]+fonts\.googleapis\.com[^>]*>/gi, '');
            };
            try {
                await loadSrcdoc(await readText('index.html'));
            } catch {
                frame.src = 'index.html';
            }
            await new Promise((resolve, reject) => {
                const timeout = setTimeout(() => reject(new Error('Timed out loading index.html test API')), 6000);
                frame.onload = () => {
                    const w = frame.contentWindow;
                    w.fetch = () => Promise.reject(new Error('fetch mocked in tests'));
                    w.confirm = () => false;
                    w.alert = () => {};
                    w.AudioContext = function () {};
                    w.webkitAudioContext = function () {};
                    w.navigator.vibrate = () => false;
                    w.navigator.wakeLock = { request: async () => ({ release: async () => {} }) };
                    w.Chart = function () { this.destroy = () => {}; };
                    w.confetti = () => {};
                    w.requestSync = () => {};
                    clearTimeout(timeout);
                    resolve();
                };
            });
            api = frame.contentWindow.__LIFT_TEST_API__;
            if (!api) throw new Error('index.html did not expose window.__LIFT_TEST_API__');
        }

        function runUtilities() {
            test('Utilities', 'rounding locks current increments', () => {
                assertEqual(api.U.rnd(102.4, 'lbs', false), 100, 'lbs default rounds 102.4 down');
                assertEqual(api.U.rnd(102.5, 'lbs', false), 105, 'lbs default rounds 102.5 up');
                assertEqual(api.U.rnd(107.49, 'lbs', false), 105, 'lbs default rounds 107.49 down');
                assertEqual(api.U.rnd(107.5, 'lbs', false), 110, 'lbs default rounds 107.5 up');
                assertEqual(api.U.rnd(101.24, 'lbs', true), 100, 'lbs micro rounds 101.24 down');
                assertEqual(api.U.rnd(101.25, 'lbs', true), 102.5, 'lbs micro rounds 101.25 up');
                assertEqual(api.U.rnd(103.74, 'lbs', true), 102.5, 'lbs micro rounds 103.74 down');
                assertEqual(api.U.rnd(103.75, 'lbs', true), 105, 'lbs micro rounds 103.75 up');
                assertEqual(api.U.rnd(101.24, 'kg', false), 100, 'kg default rounds 101.24 down');
                assertEqual(api.U.rnd(101.25, 'kg', false), 102.5, 'kg default rounds 101.25 up');
                assertEqual(api.U.rnd(103.74, 'kg', false), 102.5, 'kg default rounds 103.74 down');
                assertEqual(api.U.rnd(103.75, 'kg', false), 105, 'kg default rounds 103.75 up');
                assertEqual(api.U.rnd(101.24, 'kg', true), 101.25, 'kg micro rounds to 1.25');
                assertEqual(api.U.rnd(101.875, 'kg', true), 102.5, 'kg micro midpoint rounds up');
            });
            test('Utilities', 'unit conversion locks current constants', () => {
                assertApprox(api.U.conv(45, 'lbs', 'kg'), 20.41164, 0.0001, '45 lb to kg');
                assertApprox(api.U.conv(225, 'lbs', 'kg'), 102.0582, 0.0001, '225 lb to kg');
                assertApprox(api.U.conv(20, 'kg', 'lbs'), 44.09249, 0.0001, '20 kg to lb');
                assertApprox(api.U.conv(100, 'kg', 'lbs'), 220.4624, 0.0001, '100 kg to lb');
                assertEqual(api.U.conv(225, 'lbs', 'lbs'), 225, 'same unit stays same');
            });
            test('Utilities', 'hybrid e1RM formula expected values', () => {
                [[225,1,225],[225,5,253],[315,3,334],[225,8,285],[100,10,133],[100,12,141],[100,30,184],[0,5,0],[225,0,0]].forEach(([w,r,e]) => assertEqual(api.U.rm(w, r), e, `U.rm(${w}, ${r})`));
            });
            test('Utilities', 'volume and fatigue expected values', () => {
                const sets = [{ weight: 225, reps: 5, completed: true }, { weight: 225, reps: 5, completed: false }, { weight: 185, reps: 5, performed: 8, completed: true }];
                assertEqual(api.U.vol(sets), 2605, 'volume counts completed sets and performed reps');
                assertApprox(api.U.fatigue(225, 5, 225, false, 7), 10, 0.0001, 'fatigue baseline');
                assertApprox(api.U.fatigue(225, 5, 225, true, 7), 16, 0.0001, 'fatigue failure multiplier');
                assertApprox(api.U.fatigue(170, 8, 225, false, 8), 10.2433, 0.001, 'fatigue intensity/RPE branch');
            });
        }

        function runWorkoutGeneration() {
            test('Workout generation', 'required scheme snapshots', () => {
                assertDeepEqual(snapshot(gen('nsuns', 'vol')), ['145x8','170x6','190x4','190x4','190x4','180x5','170x6','160x7','145x8+'], 'nSuns vol snapshot');
                assertDeepEqual(snapshot(gen('nsuns', 'heavy')), ['170x5','190x3','215x1+','205x3','190x3','180x3','170x5','160x5','145x5+'], 'nSuns heavy snapshot');
                assertDeepEqual(snapshot(gen('nsuns', 'dl')), ['170x5','190x3','215x1+','205x3','190x3','180x3','170x3','160x3','145x3'], 'nSuns dl snapshot');
                assertDeepEqual(snapshot(gen('nsuns', 't2', 'Bench', 't2')), ['115x5','135x6','160x7','160x4','160x4','160x4','160x4','160x4'], 'nSuns t2 snapshot');
                assertDeepEqual(snapshot(gen('ppl', 'm5')), ['190x5','190x5','190x5','190x5','190x5+'], 'PPL m5 snapshot');
                assertDeepEqual(snapshot(gen('ppl', 'm1')), ['205x5+'], 'PPL m1 snapshot');
                assertDeepEqual(snapshot(gen('phul', 'pow')), ['190x5','190x5','190x5'], 'PHUL pow snapshot');
                assertDeepEqual(snapshot(gen('phul', 'hyp')), ['145x10','145x10','145x10'], 'PHUL hyp snapshot');
                assertDeepEqual(snapshot(gen('gzclp', 't1')), ['190x3','190x3','190x3','190x3','190x3+'], 'GZCLP t1 stage 1 snapshot');
                assertDeepEqual(snapshot(gen('531', '531', 'Bench', 't1', { cycleWeek531: 1 })), ['145x5','170x5','190x5+'], '5/3/1 week 1 snapshot');
                assertDeepEqual(snapshot(gen('531', '531', 'Bench', 't1', { cycleWeek531: 2 })), ['160x3','180x3','205x3+'], '5/3/1 week 2 snapshot');
                assertDeepEqual(snapshot(gen('531', '531', 'Bench', 't1', { cycleWeek531: 3 })), ['170x5','190x3','215x1+'], '5/3/1 week 3 snapshot');
                assertDeepEqual(snapshot(gen('531', '531', 'Bench', 't1', { cycleWeek531: 4 })), ['90x5','115x5','135x5'], '5/3/1 deload snapshot');
                assertDeepEqual(snapshot(gen('531', 'bbb', 'Bench', 't2')), ['115x10','115x10','115x10','115x10','115x10'], '5/3/1 BBB snapshot');
                assertDeepEqual(snapshot(gen('stronglifts', 'std')), ['225x5','225x5','225x5','225x5','225x5+'], 'StrongLifts std snapshot');
            });
            test('Workout generation', 'all program days and scheme groups produce sets', () => {
                Object.entries(api.DATA.progs).forEach(([program, p]) => p.days.forEach((day, idx) => {
                    const prefs = { ...DEFAULT_PREFS, program };
                    const a = api.createTestApp({ tms: FIXTURE_TMS, prefs });
                    a.pIdx = idx;
                    const t1 = a.getSets(program === 'gzclp' ? 't1' : program === 'stronglifts' ? 'std' : day.s, day.t1, FIXTURE_TMS[day.t1] || 225, 't1');
                    const t2 = a.getSets(program === 'gzclp' ? 't2' : program === 'stronglifts' ? 'std' : day.t2s, day.t2, FIXTURE_TMS[day.t2] || 225, 't2', day.t2);
                    assertTrue(t1.length > 0, `${program} day ${idx + 1} T1 generates sets`);
                    assertTrue(t2.length > 0, `${program} day ${idx + 1} T2 generates sets`);
                }));
                Object.entries(api.DATA.schemes).forEach(([group, schemes]) => Object.entries(schemes).forEach(([key, value]) => assertTrue(Array.isArray(value) && value.length > 0, `${group}.${key} has set rows`)));
            });
            test('Workout generation', 'unit, microplate, variant, 5/3/1, GZCLP, and StrongLifts selectors', () => {
                assertDeepEqual(snapshot(gen('nsuns', 'vol', 'Bench', 't1', { prefs: { weightUnit: 'kg' } })).slice(0, 3), ['147.5x8','170x6','192.5x4'], 'kg generation uses 2.5 kg rounding increments');
                assertEqual(gen('nsuns', 'vol', 'Bench', 't1', { prefs: { microplates: true } })[0].weight, 147.5, 'microplates use 2.5 lb increment');
                assertEqual(gen('nsuns', 'vol', 'Bench', 't1', { exerciseOverride: 'Incline Bench' })[0].weight, 125, 'exercise variant multiplier applies');
                assertEqual(gen('nsuns', 't2', 'Bench', 't2', { exerciseOverride: 'Incline Bench' })[0].weight, 95, 'T2 selected exercise multiplier applies');
                assertEqual(gen('531', '531', 'Bench', 't1', { cycleWeek531: 4 })[0].weight, 90, '5/3/1 cycle week selects deload');
                assertEqual(gen('gzclp', 't1', 'Bench', 't1', { state: { Bench: { t1Stage: 2 } } }).length, 6, 'GZCLP stage 2 selects six doubles');
                assertEqual(gen('stronglifts', 'std', 'Bench', 't1', { state: { Bench: { slScheme: '3x3' } } })[0].reps, 3, 'StrongLifts scheme state selects 3x3');
            });
        }

        function runProgression() {
            test('Progression', 'nSuns branches', () => {
                assertEqual(prog({ program: 'nsuns', tier: 't2', sets: completeSets(3) }).add, 2.5, 'nSuns T2 complete adds half step');
                assertEqual(prog({ program: 'nsuns', tier: 't2', sets: [completeSet(), completeSet({ completed: false })] }).add, 0, 'nSuns T2 incomplete holds');
                assertEqual(prog({ program: 'nsuns', tier: 't2', sets: [completeSet(), completeSet({ failed: true })] }).add, 0, 'nSuns T2 failed holds');
                assertEqual(prog({ program: 'nsuns', sets: completeSets(3) }).add, 0, 'nSuns T1 no AMRAP holds');
                assertEqual(prog({ program: 'nsuns', sets: [completeSet({ reps: 5, performed: 2, amrap: true })] }).add, -5, 'nSuns target >=5 delta -3 decreases');
                assertEqual(prog({ program: 'nsuns', sets: [completeSet({ reps: 5, performed: 5, amrap: true })] }).add, 0, 'nSuns target >=5 delta 0 holds');
                assertEqual(prog({ program: 'nsuns', sets: [completeSet({ reps: 5, performed: 6, amrap: true })] }).add, 2.5, 'nSuns target >=5 delta 1 half step');
                assertEqual(prog({ program: 'nsuns', sets: [completeSet({ reps: 5, performed: 8, amrap: true })] }).add, 5, 'nSuns target >=5 delta 3 full step');
                assertEqual(prog({ program: 'nsuns', sets: [completeSet({ reps: 1, performed: 1, amrap: true })] }).add, 0, 'nSuns target <5 actual <=1 holds');
                assertEqual(prog({ program: 'nsuns', sets: [completeSet({ reps: 1, performed: 3, amrap: true })] }).add, 5, 'nSuns target <5 actual 2-3 one step');
                assertEqual(prog({ program: 'nsuns', sets: [completeSet({ reps: 1, performed: 5, amrap: true })] }).add, 10, 'nSuns target <5 actual 4-5 two steps');
                assertEqual(prog({ program: 'nsuns', sets: [completeSet({ reps: 1, performed: 6, amrap: true })] }).add, 15, 'nSuns target <5 actual >5 three steps');
                assertEqual(prog({ program: 'nsuns', prefs: { weightUnit: 'kg' }, tier: 't2', sets: completeSets(3) }).add, 1.25, 'nSuns kg T2 complete adds half kg step');
            });
            test('Progression', 'linear, PPL, and PHUL branches', () => {
                assertEqual(prog({ program: 'ppl', sets: [completeSet({ reps: 5, performed: 4, amrap: true })] }).add, 0, 'PPL T1 missed AMRAP holds');
                assertEqual(prog({ program: 'ppl', sets: [completeSet({ reps: 5, performed: 7, amrap: true })] }).add, 5, 'PPL T1 delta 0-2 adds step');
                assertEqual(prog({ program: 'ppl', sets: [completeSet({ reps: 5, performed: 8, amrap: true })] }).add, 10, 'PPL T1 delta >2 adds two steps');
                assertEqual(prog({ program: 'phul', tier: 't2', sets: completeSets(3) }).add, 5, 'PHUL T2 complete adds step');
                assertEqual(prog({ program: 'phul', tier: 't2', sets: [completeSet(), completeSet({ completed: false })] }).add, 0, 'PHUL T2 incomplete holds');
            });
            test('Progression', '5/3/1 branches', () => {
                assertEqual(prog({ program: '531', tier: 't2', sets: completeSets(5) }).add, 0, '5/3/1 T2 no change');
                assertEqual(prog({ program: '531', cycleWeek531: 1, sets: [completeSet({ reps: 5, performed: 8, amrap: true })] }).add, 0, '5/3/1 week 1 in-cycle no change');
                assertEqual(prog({ program: '531', cycleWeek531: 4, lift: 'Bench', sets: completeSets(3) }).add, 5, '5/3/1 week 4 upper complete +5 lb');
                assertEqual(prog({ program: '531', cycleWeek531: 4, lift: 'Squat', sets: completeSets(3) }).add, 10, '5/3/1 week 4 lower complete +10 lb');
                assertEqual(prog({ program: '531', cycleWeek531: 4, lift: 'Bench', prefs: { weightUnit: 'kg' }, sets: completeSets(3) }).add, 2.5, '5/3/1 week 4 upper kg +2.5');
                assertEqual(prog({ program: '531', cycleWeek531: 4, lift: 'Squat', prefs: { weightUnit: 'kg' }, sets: completeSets(3) }).add, 5, '5/3/1 week 4 lower kg +5');
                assertEqual(prog({ program: '531', cycleWeek531: 4, lift: 'Bench', sets: [completeSet(), completeSet({ completed: false })] }).add, 0, '5/3/1 incomplete deload week holds');
                assertEqual(prog({ program: '531', cycleWeek531: 4, lift: 'Bench', sets: [completeSet({ reps: 5, performed: 4, amrap: true })], history: [] }).add, 0, '5/3/1 failed fewer than two recent failures holds');
                const failHist = [1, 2].map(() => ({ details: { t1: 'Bench' }, setDetails: { t1: [completeSet({ reps: 5, performed: 4, amrap: true })] } }));
                assertEqual(prog({ program: '531', cycleWeek531: 4, lift: 'Bench', sets: [completeSet({ reps: 5, performed: 4, amrap: true })], history: failHist }).add, -22.5, '5/3/1 failed with two recent failures deloads 10%');
            });
            test('Progression', 'GZCLP and StrongLifts branches', () => {
                assertEqual(prog({ program: 'gzclp', lift: 'Bench', sets: [completeSet({ reps: 3, performed: 3, amrap: true })] }).add, 5, 'GZCLP T1 stage 1 pass +5');
                assertEqual(prog({ program: 'gzclp', lift: 'Bench', sets: [completeSet({ completed: false })], state: { Bench: { t1Stage: 1 } } }).state.Bench.t1Stage, 2, 'GZCLP T1 fail stage 1 advances');
                assertEqual(prog({ program: 'gzclp', lift: 'Bench', sets: [completeSet({ completed: false })], state: { Bench: { t1Stage: 2 } } }).state.Bench.t1Stage, 3, 'GZCLP T1 fail stage 2 advances');
                const gzReset = prog({ program: 'gzclp', lift: 'Bench', sets: [completeSet({ completed: false })], state: { Bench: { t1Stage: 3 } } });
                assertApprox(gzReset.add, -33.75, 0.001, 'GZCLP T1 stage 3 reset deloads 15%');
                assertEqual(gzReset.state.Bench.t1Stage, 1, 'GZCLP T1 reset returns to stage 1');
                assertEqual(prog({ program: 'gzclp', tier: 't2', lift: 'Bench', sets: completeSets(3) }).add, 5, 'GZCLP T2 pass +5');
                assertEqual(prog({ program: 'gzclp', tier: 't2', lift: 'Bench', sets: [completeSet({ completed: false })], state: { Bench: { t2Stage: 1 } } }).state.Bench.t2Stage, 2, 'GZCLP T2 fail advances');
                assertEqual(prog({ program: 'gzclp', tier: 't2', lift: 'Bench', sets: [completeSet({ completed: false })], state: { Bench: { t2Stage: 3 } } }).state.Bench.t2Stage, 1, 'GZCLP T2 stage 3 fail resets');
                assertEqual(prog({ program: 'stronglifts', lift: 'Bench', sets: completeSets(5) }).add, 5, 'StrongLifts non-deadlift complete +5');
                assertEqual(prog({ program: 'stronglifts', lift: 'Deadlift', sets: completeSets(1) }).add, 10, 'StrongLifts deadlift complete +10');
                assertEqual(prog({ program: 'stronglifts', lift: 'Bench', prefs: { weightUnit: 'kg' }, sets: completeSets(5) }).add, 2.5, 'StrongLifts non-deadlift kg +2.5');
                assertEqual(prog({ program: 'stronglifts', lift: 'Deadlift', prefs: { weightUnit: 'kg' }, sets: completeSets(1) }).add, 5, 'StrongLifts deadlift kg +5');
                assertEqual(prog({ program: 'stronglifts', lift: 'Bench', sets: [completeSet({ completed: false })] }).add, 0, 'StrongLifts first failure retries');

                assertEqual(api.resolveTheme('bogus', false), 'dark', 'invalid saved theme resolves dark');

                api.hydrateState({ version: api.DATA_VERSION, main: {}, prefs: { theme: 'system' } }, st);
                assertEqual(api.serializeState(st).prefs.theme, 'system', 'theme survives save/load helpers');
            });
            test('Theme / preferences', 'legacy program names resolve to matching descriptions', () => {
                const aliases = { '5/3/1BBB': '531', '5/3/1 BBB': '531', 'SL 5x5': 'stronglifts', 'nSuns LP': 'nsuns', PHUL: 'phul' };
                Object.entries(aliases).forEach(([saved, expected]) => assertEqual(api.mergePrefs({ program: saved }).program, expected, `${saved} canonical program key`));
                assertEqual(api.DATA.progs[api.mergePrefs({ program: '5/3/1BBB' }).program].name, '5/3/1 BBB', '5/3/1 description card matches selector');
            });
            test('Theme / preferences', 'achievement icons are valid Unicode', () => {
                api.createTestApp().ACHIEVEMENTS.forEach(a => {
                    assertFalse(/[Ãâð]/.test(a.icon), `${a.id} icon has no mojibake`);
                    assertTrue(Array.from(a.icon).length >= 1, `${a.id} icon is present`);
                });
            });
        }

        function runSmoke() {
            test('Smoke tests', 'required API and app methods exist', () => {
                ['DATA','PROG','U','impact','createTestApp','generateSets','calculateProgression','calculatePlateLoading','calculateRecoverySnapshot','calculateVolumeLandmarks','evaluatePR','serializeState','hydrateState','calculateRestSuggestion','validateProgramProgressionContext','validateAllProgramScience','setRestFloor'].forEach(k => assertTrue(api[k] != null, `API exposes ${k}`));
                ['init','destroy','getSets','start','computeProgression','findTopAMRAP','findBestCompletedSet','_computeBestE1RMFromSets','_recordE1RM','_updatePR','saveFinish','updCache','_computeVolumeLandmarks','getReadinessScore','getRecoveryAdvice','calcPlates','closestWeight','save','saveSess','togUnit','exportJSON','importData','analyze_fatigue_and_suggest_rest','acceptDynamicRestSuggestion','declineDynamicRestSuggestion'].forEach(k => assertEqual(typeof api.createTestApp()[k], 'function', `app exposes ${k}`));
                const audits = api.validateAllProgramScience();
                assertEqual(audits.length, Object.keys(api.DATA.progs).length, 'program science audit covers every program');
                audits.forEach(a => {
                    assertFalse(a.status === 'fail', `${a.program} progression validator has source data`);
                    assertEqual(a.dayAudit.length, api.DATA.progs[a.program].days.length, `${a.program} audits every day`);
                    assertTrue(a.schemeAudit.length > 0, `${a.program} audits scheme rows`);
                });
                assertEqual(api.validateProgramProgressionContext('nsuns').status, 'adjust', 'nSuns high-frequency risk is identified and mitigated');
                assertEqual(api.validateProgramProgressionContext('ppl').status, 'adjust', 'PPL six-day risk is identified and mitigated');
            });
            test('Smoke tests', 'deload helper covers time off, performance, fatigue, and doDeload rounding', () => {
                const last = { timestamp: NOW - 14 * 864e5, details: { t1: 'Bench' }, setDetails: { t1: [] } };
                assertEqual(api.calculateDeloadSuggestion({ history: [last], now: NOW }).percentage, 10, '14 days off suggests 10%');
                assertEqual(api.calculateDeloadSuggestion({ history: [{ ...last, timestamp: NOW - 28 * 864e5 }], now: NOW }).percentage, 20, '28 days off suggests 20%');
                assertEqual(api.calculateDeloadSuggestion({ history: [{ ...last, timestamp: NOW - 42 * 864e5 }], now: NOW }).percentage, 25, '42 days off suggests 25%');
                const missed = Array.from({ length: 6 }, (_, i) => ({ timestamp: NOW - (6 - i) * 864e5, details: { t1: 'Bench' }, setDetails: { t1: [completeSet({ reps: 5, performed: 4, amrap: true })] } }));
                assertIncludes(api.calculateDeloadSuggestion({ history: missed, session: { t1: { name: 'Bench' } }, now: NOW }).reason, '3 consecutive', 'three missed AMRAPs trigger performance deload');
                const e1rmHistory = { Bench: [{ e1rm: 300 }, { e1rm: 290 }], Squat: [{ e1rm: 400 }, { e1rm: 380 }], Deadlift: [{ e1rm: 500 }, { e1rm: 475 }] };
                const highRpe = Array.from({ length: 8 }, (_, i) => ({ timestamp: NOW - i * 864e5, rpe: 9, details: { t1: 'Bench' }, setDetails: { t1: [] } }));
                assertEqual(api.calculateDeloadSuggestion({ history: highRpe, tms: FIXTURE_TMS, e1rmHistory, readinessMap: { a: 30 }, now: NOW }).protocol, 'Fatigue_Deload', 'fatigue deload triggers');
                const a = api.createTestApp({ tms: { Bench: 225, Squat: 315 }, prefs: { weightUnit: 'lbs', microplates: false } });
                a.deloadInfo = { percentage: 10 };
                a.save = () => {};
                a.doDeload();
                assertEqual(a.tms.Bench, 205, 'doDeload rounds Bench down by selected percentage');
                assertEqual(a.tms.Squat, 285, 'doDeload rounds Squat down by selected percentage');
            });
        }

        async function runLoginFlow() {
            await testAsync('Persistence', 'production login creates an isolated account without real Pantry calls', async () => {
                const a = api.createTestApp();
                a.auth = { username: '__LIFT_TEST__recovery_audit', password: 'isolated-test-password', error: '', loading: false };
                let pantryReads = 0;
                let cloudCreates = 0;
                let savedUser = null;
                a.pantryReq = async (method, basket) => {
                    pantryReads++;
                    assertEqual(method, 'GET', 'login checks for an existing basket first');
                    assertEqual(basket, 'lift_lifttestrecoveryaudit', 'basket name uses production normalization');
                    return null;
                };
                a.pushToCloud = async () => { cloudCreates++; };
                a.init = () => {};
                const oldSave = api.U.s;
                api.U.s = (key, value) => { if (key === 'lift_user') savedUser = value; };
                try {
                    await a.handleLogin();
                    assertEqual(pantryReads, 1, 'login performs one isolated account lookup');
                    assertEqual(cloudCreates, 1, 'new account uses the production create path');
                    assertEqual(a.view, 'dashboard', 'successful login reaches dashboard');
                    assertEqual(savedUser.username, '__LIFT_TEST__recovery_audit', 'login persists the expected test user');
                    assertTrue(savedUser.hash.length === 64, 'password is stored as a SHA-256 hash');
                } finally {
                    api.U.s = oldSave;
                }
            });
        }

        function render() {
            const pass = results.filter(r => r.ok).length;
            const fail = results.filter(r => !r.ok).length;
            el('passCount').textContent = pass;
            el('failCount').textContent = fail;
            el('totalCount').textContent = results.length;
            el('status').textContent = fail ? 'Failed' : 'All tests passed';
            el('status').className = `metric ${fail ? 'fail' : 'pass'}`;
            const root = el('results');
            root.innerHTML = '';
            GROUPS.forEach(group => {
                const items = results.filter(r => r.group === group);
                const groupFail = items.filter(r => !r.ok).length;
                const groupPass = items.length - groupFail;
                const d = document.createElement('details');
                d.open = groupFail > 0 || group === 'Utilities';
                d.className = groupFail ? '' : 'all-good';
                d.innerHTML = `<summary>${group}: <span class="pass">${groupPass} passed</span>, <span class="fail">${groupFail} failed</span></summary>`;
                items.forEach(r => {
                    const row = document.createElement('div');
                    row.className = 'test-row';
                    row.innerHTML = `<div class="${r.ok ? 'pass' : 'fail'}">${r.ok ? 'PASS' : 'FAIL'}</div><div><strong>${r.message}</strong>${r.ok ? '' : `<pre>Expected: ${clean(r.expected)}\nActual: ${clean(r.actual)}\n${r.details || ''}</pre>`}</div>`;
                    d.appendChild(row);
                });
                root.appendChild(d);
            });
            console.log(`LIFT tests: ${pass}/${results.length} passed, ${fail} failed`);
        }

        async function runAll() {
            results = [];
            el('status').textContent = 'Running';
            el('status').className = 'metric';
            try {
                await loadIndexApi();
                runUtilities();
                runWorkoutGeneration();
                runProgression();
                runRecovery();
                runVolumeLandmarks();
                runPR();
                runPlateLoading();
                runPersistence();
                runTheme();
                runSmoke();
                await runLoginFlow();
            } catch (err) {
                results.push({ group: 'Smoke tests', ok: false, message: 'test runner setup', expected: 'API loaded', actual: err.message, details: err.stack || '' });
            }
            render();
        }

        window.assertEqual = assertEqual;
        window.assertApprox = assertApprox;
        window.assertDeepEqual = assertDeepEqual;
        window.assertTrue = assertTrue;
        window.assertFalse = assertFalse;
        window.assertIncludes = assertIncludes;
        el('runAgain').addEventListener('click', runAll);
        runAll();
    </script>
